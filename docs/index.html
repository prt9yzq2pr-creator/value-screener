<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Value Screener — Ranking EE.UU.</title>
<style>
  :root {
    --bg: #f6f7f9; --card: #ffffff; --text: #1a1d21; --muted: #6b7280;
    --border: #e2e5e9; --accent: #1a56db; --ok: #047857; --ok-bg: #ecfdf5;
    --bad: #b91c1c; --head: #f0f2f5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111418; --card: #1a1f26; --text: #e5e7eb; --muted: #9ca3af;
      --border: #2a313b; --accent: #60a5fa; --ok: #34d399; --ok-bg: #0c2921;
      --bad: #f87171; --head: #20262e;
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 15px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--text); }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px 60px; }
  .top { display: flex; justify-content: space-between; align-items: flex-start;
         gap: 12px; flex-wrap: wrap; }
  h1 { font-size: 1.5rem; margin: 0 0 4px; }
  .top-links { display: flex; gap: 10px; align-items: center; }
  .top-links a { color: var(--muted); font-size: .85rem; text-decoration: none;
                 border-bottom: 1px dotted var(--muted); }
  .top-links a:hover { color: var(--accent); }
  .lang-btn { padding: 5px 12px; border: 1px solid var(--border); border-radius: 8px;
              background: var(--card); color: var(--text); cursor: pointer;
              font-size: .85rem; font-weight: 600; }
  .lang-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sub { color: var(--muted); font-size: .9rem; margin-bottom: 20px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab { padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px;
         background: var(--card); cursor: pointer; font-size: .95rem; color: var(--text); }
  .tab.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  input[type=search] { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
         background: var(--card); color: var(--text); width: 260px; max-width: 100%; }
  select { padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px;
         background: var(--card); color: var(--text); }
  label.chk { display: flex; gap: 6px; align-items: center; color: var(--muted); cursor: pointer; }
  .n { color: var(--muted); font-size: .85rem; margin-left: auto; }
  .tblwrap { overflow-x: auto; background: var(--card); border: 1px solid var(--border);
             border-radius: 10px; }
  table { border-collapse: collapse; width: 100%; min-width: 760px; font-size: .88rem; }
  th, td { padding: 7px 10px; text-align: right; white-space: nowrap; }
  th:nth-child(2), td:nth-child(2), th:nth-child(3), td:nth-child(3) { text-align: left; }
  thead th { background: var(--head); position: sticky; top: 0; cursor: pointer;
             user-select: none; border-bottom: 1px solid var(--border); }
  thead th:hover { color: var(--accent); }
  tbody tr { border-top: 1px solid var(--border); }
  tbody tr.apta { background: var(--ok-bg); }
  td.tk { font-weight: 600; }
  td.tk a { color: var(--accent); text-decoration: none; }
  td.tk a:hover { text-decoration: underline; }
  td.nm { max-width: 240px; overflow: hidden; text-overflow: ellipsis; color: var(--muted); }
  .badge { font-size: .78rem; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
  .badge.si { color: var(--ok); background: transparent; border: 1px solid var(--ok); }
  .badge.no { color: var(--bad); opacity: .8; }
  .foot { margin-top: 22px; color: var(--muted); font-size: .82rem; max-width: 800px; }
  .foot b { color: var(--text); }
  .arrow { font-size: .7rem; }
  .corta-nota { background: var(--ok-bg); border: 1px solid var(--ok); border-radius: 10px;
                padding: 10px 14px; font-size: .86rem; margin: 0 0 14px; }
  .leyenda { margin: 0 0 14px; font-size: .86rem; color: var(--muted); }
  .leyenda summary { cursor: pointer; color: var(--accent); }
  .leyenda ul { margin: 8px 0 0; padding-left: 18px; }
  .leyenda li { margin-bottom: 4px; }
  .disclaimer { margin-top: 18px; padding: 12px 16px; border: 1px solid var(--border);
                border-left: 3px solid var(--bad); border-radius: 8px;
                color: var(--muted); font-size: .8rem; max-width: 800px; }
  .disclaimer b { color: var(--text); }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1 id="titulo">Value Screener — EE.UU.</h1>
    <div class="top-links">
      <a href="#aviso" id="avisoLink">Aviso legal</a>
      <button class="lang-btn" id="langBtn">EN</button>
    </div>
  </div>
  <div class="sub" id="sub">…</div>

  <div class="tabs">
    <button class="tab on" id="tabG"></button>
    <button class="tab" id="tabF"></button>
    <button class="tab" id="tabL"></button>
    <button class="tab" id="tabC"></button>
  </div>

  <div class="controls">
    <input type="search" id="q">
    <select id="uni">
      <option value=""></option>
      <option value="top500"></option>
      <option value="russell"></option>
    </select>
    <label class="chk"><input type="checkbox" id="soloAptas"> <span id="lblSolo"></span></label>
    <span class="n" id="count"></span>
  </div>

  <p class="corta-nota" id="cortaNota" style="display:none"></p>
  <p class="corta-nota" id="carteraNota" style="display:none"></p>

  <details class="leyenda">
    <summary id="leySum"></summary>
    <ul id="leyBody"></ul>
  </details>

  <div class="tblwrap"><table id="tbl"><thead></thead><tbody></tbody></table></div>

  <div class="foot" id="foot"></div>

  <div class="disclaimer" id="aviso"></div>
</div>

<script>
const T = {
es: {
  titulo: 'Value Screener — EE.UU.',
  docTitle: 'Value Screener — Ranking EE.UU.',
  nd: 'n/d',

  tabC: '📋 Cartera modelo',
  buscar: 'Buscar ticker o nombre…',
  uniTodos: 'Todos los universos', uniTop: 'Top 500 (grandes)', uniRus: 'Russell 2000 (small caps)',
  solo: 'solo las que pasan filtros',
  valores: 'valores', pasa: 'pasa', noPasa: 'no',
  avisoLink: 'Aviso legal', leySum: '¿Qué significa cada columna?',

  carteraNota: (creada, n) => `<b>Cartera modelo</b> (simulación educativa, creada el ${creada}): los ${n} primeros valores del ranking general que pasan los filtros de calidad, a peso igual (${(100/n).toFixed(0)}% cada uno). Cada posición se mantiene 12 meses y al vencer se sustituye automáticamente por el mejor valor disponible del ranking — la mecánica exacta del backtest de Greenblatt (selección puramente mecánica, sin juicio humano). Precios y datos con actualización semestral; rentabilidades sin dividendos ni costes. No es una recomendación de compra: es la estrategia publicada, aplicada en público para poder juzgarla con el tiempo.`,
  cols: { rank: '#', ticker: 'Ticker', nombre: 'Nombre', cap: 'Capitalización',
    ev_ebit: 'EV/EBIT', roic: 'ROIC', fcf_yield: 'FCF yield', earnings_yield: 'E. yield',

    pb: 'Precio / valor contable del patrimonio',
    deuda_ebitda: 'Deuda neta / EBITDA: años que tardaría en pagar su deuda. Más de 4 = demasiada',
    piotroski: 'Test de 9 señales de salud financiera vs. año anterior. 7-9 = mejorando',
    apta: 'Pasa o no los filtros de calidad; en "no", pasa el ratón para ver el motivo',
    roe: 'Beneficio / capital de los accionistas. Más de 10-12% es bueno en financieras',
    roa: 'Beneficio / activos totales. En banca, más de 1% es sólido',
    capital_activos: 'Colchón de capital sobre el balance. Menos de 4% = banco frágil',
    score: 'Test propio de 6 señales para financieras (rentabilidad, solvencia, mejora)',
    peso: 'Peso objetivo en la cartera: igual para todas las posiciones',
    entrada: 'Fecha en que la posición entró en la cartera modelo',
    rotacion: 'Fecha prevista de rotación (12 meses después de la entrada)',

    rent: 'Rentabilidad desde la entrada, sin dividendos ni costes',
    rank_actual: 'Posición actual del valor en el ranking general (fila verde = sigue pasando filtros)' },
  leyenda: [
    ['#', 'posición en el ranking (menor = mejor combinación de barato y rentable).'],
    ['Capitalización', 'lo que vale la empresa en bolsa (precio × nº de acciones). M$ = millones, MM$ = miles de millones, T$ = billones.'],
    ['EV/EBIT', 'precio de toda la empresa (incluyendo su deuda) dividido por su beneficio operativo anual. Cuanto más bajo, más barata. Menos de 10 suele considerarse barato.'],
    ['ROIC', 'rentabilidad que saca la empresa al capital que tiene invertido. Más de 15% indica buen negocio. (Con patrimonio negativo por recompras el número se distorsiona: ignóralo en esos casos.)'],
    ['FCF yield', 'caja libre que genera al año (cobros menos pagos e inversiones) dividida por su precio en bolsa. Es el "interés" real que rinde la empresa; más de 8% es mucho.'],
    ['E. yield', 'beneficio operativo dividido por el valor total de la empresa; la vara de medir de "barato" en la Magic Formula.'],
    ['PER', 'precio dividido por beneficio neto: cuántos años de beneficio cuesta la empresa.'],
    ['P/B', 'precio dividido por valor contable (lo que dice el balance que valen sus activos menos deudas).'],
    ['DN/EBITDA', 'deuda neta dividida por EBITDA: años de beneficio bruto que tardaría en pagar su deuda. Más de 4 es demasiada deuda.'],
    ['Piotroski', 'test de 9 señales de salud financiera comparando con el año anterior (beneficio, caja, deuda, márgenes...). 7-9 = mejorando; 0-4 = deteriorándose.'],

    ['ROE (financieras)', 'beneficio dividido por el capital de los accionistas; la rentabilidad básica de un banco o aseguradora. Más de 10-12% es bueno.'],

    ['Cap/Activos (financieras)', 'colchón de capital sobre el total del balance; menos de 4% es un banco frágil.'],
    ['Score (financieras)', 'test propio de 6 señales: beneficio positivo, ROE > 10%, ROA > 0,7%, capital > 5%, rentabilidad mejorando y sin diluir al accionista.']],
  foot: `<p><b>Fuente:</b> cuentas anuales oficiales presentadas a la SEC (EDGAR, XBRL) de las 500
    mayores cotizadas de EE.UU. más el Russell 2000. Precios de mercado de Yahoo Finance.</p>
    <p><b>General:</b> ranking Magic Formula (barato = EBIT/EV alto; rentable = retorno sobre
    capital alto). Filtros de calidad: deuda neta/EBITDA ≤ 4, cobertura de intereses ≥ 3,
    ROIC ≥ 8%, FCF positivo, Piotroski ≥ 5. <b>Financieras:</b> ranking por PER y ROE;

    engañan a cualquier screener. Analiza antes de invertir.</p>`,
  disclaimer: `<b>Aviso legal.</b> Esta página tiene una finalidad exclusivamente informativa y
    educativa. Su contenido no constituye asesoramiento financiero, recomendación de
    inversión, oferta ni solicitud de compra o venta de valores, y su autor no es una

    responsabilidad exclusiva de quien la toma; antes de invertir, consulte con un
    asesor financiero debidamente autorizado.`,
  cap: v => v >= 1e12 ? (v / 1e12).toFixed(2) + ' T$'
        : v >= 1e9 ? (v / 1e9).toFixed(1) + ' MM$'
        : (v / 1e6).toFixed(0) + ' M$',
},
en: {
  titulo: 'Value Screener — USA',
  docTitle: 'Value Screener — US Ranking',
  nd: 'n/a',
  sub: (n, f) => `${n} companies with metrics · updated ${f}`,
  tabG: 'General (Magic Formula)', tabF: 'Financials', tabL: '⭐ Shortlist',
  tabC: '📋 Model portfolio',
  buscar: 'Search ticker or name…',
  uniTodos: 'All universes', uniTop: 'Top 500 (large caps)', uniRus: 'Russell 2000 (small caps)',
  solo: 'only stocks passing filters',
  valores: 'stocks', pasa: 'pass', noPasa: 'no',
  avisoLink: 'Legal notice', leySum: 'What does each column mean?',
  cortaNota: '<b>Shortlist</b>: companies that pass every quality filter and additionally meet Piotroski ≥ 7, FCF yield &gt; 8% and EV/EBIT &lt; 10. It is the strictest funnel in the screener: genuinely cheap, generating real cash, with improving fundamentals. A starting point for manual analysis, not a buy list.',
  carteraNota: (creada, n) => `<b>Model portfolio</b> (educational simulation, created ${creada}): the top ${n} stocks in the general ranking that pass the quality filters, equally weighted (${(100/n).toFixed(0)}% each). Each position is held for 12 months and automatically replaced at expiry with the best available stock in the ranking — the exact mechanics of Greenblatt's backtest (purely mechanical selection, no human judgment). Prices and data refresh every six months; returns exclude dividends and costs. Not a buy recommendation: it is the published strategy, run in public so it can be judged over time.`,
  cols: { rank: '#', ticker: 'Ticker', nombre: 'Name', cap: 'Market cap',
    ev_ebit: 'EV/EBIT', roic: 'ROIC', fcf_yield: 'FCF yield', earnings_yield: 'E. yield',
    per: 'P/E', pb: 'P/B', deuda_ebitda: 'ND/EBITDA', piotroski: 'Piotroski', apta: 'Filters',
    roe: 'ROE', roa: 'ROA', capital_activos: 'Eq/Assets', score: 'Score',
    peso: 'Weight', entrada: 'Entry', rotacion: 'Rotation', precio_entrada: 'Entry price',
    precio_actual: 'Last price', rent: 'Return', rank_actual: 'Current rank' },
  tips: {
    rank: 'Ranking position: lower = better mix of cheap and profitable',
    ticker: 'Trading symbol; the link opens its Yahoo Finance page',
    nombre: 'Company name',
    cap: 'Market value (price × shares outstanding). $M=millions, $B=billions, $T=trillions',
    ev_ebit: 'Whole-company price (debt included) / operating profit. Lower = cheaper',
    roic: 'Return on invested capital. Above 15% = good business',
    fcf_yield: 'Annual free cash flow / market cap: the real "interest rate" it earns you',
    earnings_yield: 'Operating profit / enterprise value: the Magic Formula’s yardstick for "cheap"',
    per: 'Price / net income: years of earnings you pay for the company',
    pb: 'Price / book value of equity',
    deuda_ebitda: 'Net debt / EBITDA: years needed to repay its debt. Above 4 = too much',
    piotroski: '9-signal financial health test vs. prior year. 7-9 = improving',
    apta: 'Passes the quality filters or not; on "no", hover to see why',
    roe: 'Net income / shareholders’ equity. Above 10-12% is good for financials',
    roa: 'Net income / total assets. In banking, above 1% is solid',
    capital_activos: 'Equity cushion over total assets. Below 4% = fragile bank',
    score: 'In-house 6-signal test for financials (profitability, solvency, improvement)',
    peso: 'Target weight in the portfolio: equal across positions',
    entrada: 'Date the position entered the model portfolio',
    rotacion: 'Scheduled rotation date (12 months after entry)',
    precio_entrada: 'Share price when the position was opened',
    precio_actual: 'Latest known price (updated every six months)',
    rent: 'Return since entry, excluding dividends and costs',
    rank_actual: 'Current position in the general ranking (green row = still passes filters)' },
  leyenda: [
    ['#', 'ranking position (lower = better combination of cheap and profitable).'],
    ['Market cap', 'what the company is worth on the stock market (price × number of shares).'],
    ['EV/EBIT', 'whole-company price (debt included) divided by annual operating profit. The lower, the cheaper. Below 10 is usually considered cheap.'],
    ['ROIC', 'the return the company earns on the capital it has invested. Above 15% indicates a good business. (With negative equity from buybacks the figure gets distorted: ignore it in those cases.)'],
    ['FCF yield', 'free cash generated per year (receipts minus payments and investments) divided by market price. It is the real "interest rate" the company yields; above 8% is a lot.'],
    ['E. yield', 'operating profit divided by enterprise value; the Magic Formula’s yardstick for "cheap".'],
    ['P/E', 'price divided by net income: how many years of earnings the company costs.'],
    ['P/B', 'price divided by book value (what the balance sheet says its assets minus debts are worth).'],

    ['ROE (financials)', 'net income divided by shareholders’ equity; the basic profitability of a bank or insurer. Above 10-12% is good.'],
    ['ROA (financials)', 'net income over total assets; in banking, above 1% is solid.'],
    ['Eq/Assets (financials)', 'equity cushion over the total balance sheet; below 4% is a fragile bank.'],
    ['Score (financials)', 'in-house 6-signal test: positive earnings, ROE > 10%, ROA > 0.7%, equity > 5%, improving returns, no shareholder dilution.']],
  foot: `<p><b>Source:</b> official annual filings with the SEC (EDGAR, XBRL) for the 500 largest
    US-listed companies plus the Russell 2000. Market prices from Yahoo Finance.</p>
    <p><b>General:</b> Magic Formula ranking (cheap = high EBIT/EV; profitable = high return on
    capital). Quality filters: net debt/EBITDA ≤ 4, interest coverage ≥ 3, ROIC ≥ 8%,
    positive FCF, Piotroski ≥ 5. <b>Financials:</b> ranked by P/E and ROE;
    filters: ROE ≥ 8%, equity/assets ≥ 4%, score ≥ 4/6.</p>
    <p>A green row passes every filter. This is a quantitative funnel, not a buy
    recommendation: peak-cycle earnings and one-off gains fool any screener.
    Do your analysis before investing.</p>`,
  disclaimer: `<b>Legal notice.</b> This page is for informational and educational purposes only.
    Its content does not constitute financial advice, an investment recommendation, or an
    offer or solicitation to buy or sell securities, and its author is not an investment
    firm or a licensed financial adviser. Data come from public sources (SEC EDGAR,

    Investing in equities carries risk of loss, up to the entire capital invested. Any
    investment decision based on this information is the sole responsibility of the
    person making it; before investing, consult a duly licensed financial adviser.`,
  cap: v => v >= 1e12 ? '$' + (v / 1e12).toFixed(2) + 'T'
        : v >= 1e9 ? '$' + (v / 1e9).toFixed(1) + 'B'
        : '$' + (v / 1e6).toFixed(0) + 'M',
},
};

let lang = localStorage.getItem('vs_lang') || 'es';
let DATA = null, vista = 'general', sortKey = 'rank', sortAsc = true;

const ND = () => T[lang].nd;
const PCT = v => v == null ? ND() : (v * 100).toFixed(1) + '%';
const NUM = v => v == null ? ND() : v.toFixed(2);
const INT = v => v == null ? ND() : String(v);
const CAP = v => v == null ? ND() : T[lang].cap(v);

// Los motivos de descarte vienen de los datos en español; en modo ingles
// se traducen aqui por patron (los textos son fijos, solo varia la cifra).
const RAZON_EN = [
  ['deuda neta/EBITDA alta', 'high net debt/EBITDA'],
  ['cobertura de intereses baja', 'low interest coverage'],
  ['ROIC bajo', 'low ROIC'],
  ['FCF negativo', 'negative FCF'],
  ['Piotroski debil', 'weak Piotroski'],
  ['perdidas', 'losses'],
  ['ROE bajo', 'low ROE'],
  ['capital debil', 'weak capital'],
  ['score financiero debil', 'weak financial score'],
  ['sobre activos', 'of assets'],
];
const trRazon = s => lang === 'es' ? s
  : RAZON_EN.reduce((acc, [es, en]) => acc.replace(es, en), s);

const STR = v => v == null ? ND() : v;
const PRC = v => v == null ? ND() : '$' + v.toFixed(2);
const PESO = v => v == null ? ND() : (v * 100).toFixed(0) + '%';
const RENT = v => v == null ? ND()
  : `<span style="color:var(--${v >= 0 ? 'ok' : 'bad'});font-weight:600">${v >= 0 ? '+' : ''}${(v * 100).toFixed(1)}%</span>`;

const COLKEYS = {
  general: [['rank', INT], ['ticker', null], ['nombre', null], ['cap', CAP],
    ['ev_ebit', NUM], ['roic', PCT], ['fcf_yield', PCT], ['earnings_yield', PCT],
    ['per', NUM], ['pb', NUM], ['deuda_ebitda', NUM], ['piotroski', INT], ['apta', null]],
  financieras: [['rank', INT], ['ticker', null], ['nombre', null], ['cap', CAP],
    ['per', NUM], ['pb', NUM], ['roe', PCT], ['roa', PCT], ['capital_activos', PCT],
    ['score', v => v == null ? ND() : v + '/6'], ['apta', null]],
  cartera: [['ticker', null], ['nombre', null], ['peso', PESO], ['entrada', STR],
    ['rotacion', STR], ['precio_entrada', PRC], ['precio_actual', PRC],
    ['rent', RENT], ['rank_actual', INT]],
};
COLKEYS.corta = COLKEYS.general;

const esCorta = r => r.apta && r.piotroski != null && r.piotroski >= 7 &&
                     r.fcf_yield != null && r.fcf_yield > 0.08 &&
                     r.ev_ebit != null && r.ev_ebit < 10;

function applyLang() {
  const t = T[lang];
  document.documentElement.lang = lang;
  document.title = t.docTitle;
  document.getElementById('titulo').textContent = t.titulo;
  document.getElementById('avisoLink').textContent = t.avisoLink;
  document.getElementById('langBtn').textContent = lang === 'es' ? 'EN' : 'ES';
  document.getElementById('tabG').textContent = t.tabG;
  document.getElementById('tabF').textContent = t.tabF;
  document.getElementById('tabL').textContent = t.tabL;
  document.getElementById('tabC').textContent = t.tabC;
  document.getElementById('q').placeholder = t.buscar;
  const opts = document.getElementById('uni').options;
  opts[0].text = t.uniTodos; opts[1].text = t.uniTop; opts[2].text = t.uniRus;
  document.getElementById('lblSolo').textContent = t.solo;
  document.getElementById('cortaNota').innerHTML = t.cortaNota;
  document.getElementById('leySum').textContent = t.leySum;
  document.getElementById('leyBody').innerHTML =
    t.leyenda.map(([k, d]) => `<li><b>${k}</b> — ${d}</li>`).join('');
  document.getElementById('foot').innerHTML = t.foot;
  document.getElementById('aviso').innerHTML = t.disclaimer;
  if (DATA) {
    document.getElementById('sub').textContent = t.sub(DATA.n_metricas, DATA.generado);
    if (DATA.cartera) document.getElementById('carteraNota').innerHTML =
      t.carteraNota(DATA.cartera.creada, DATA.cartera.n);
    render();
  }
}

fetch('data.json').then(r => r.json()).then(d => { DATA = d; applyLang(); });

function render() {
  if (!DATA) return;
  const t = T[lang];
  const cols = COLKEYS[vista];
  const q = document.getElementById('q').value.trim().toLowerCase();
  const solo = document.getElementById('soloAptas').checked;
  const uni = document.getElementById('uni').value;

  const base = vista === 'corta' ? DATA.general.filter(esCorta)
             : vista === 'cartera' ? DATA.cartera.posiciones
             : DATA[vista];
  let rows = base.filter(r =>
    (!solo || r.apta) &&
    (!uni || r.grupo === uni) &&
    (!q || r.ticker.toLowerCase().includes(q) || r.nombre.toLowerCase().includes(q)));

  rows.sort((a, b) => {
    const x = a[sortKey], y = b[sortKey];
    if (x == null) return 1;
    if (y == null) return -1;
    const c = typeof x === 'string' ? x.localeCompare(y) : x - y;
    return sortAsc ? c : -c;
  });

  const thead = document.querySelector('#tbl thead');
  thead.innerHTML = '<tr>' + cols.map(([k]) =>
    `<th data-k="${k}" title="${t.tips[k] || ''}">${t.cols[k]}${k === sortKey ? `<span class="arrow"> ${sortAsc ? '▲' : '▼'}</span>` : ''}</th>`
  ).join('') + '</tr>';
  thead.querySelectorAll('th').forEach(th => th.onclick = () => {
    const k = th.dataset.k;
    if (sortKey === k) sortAsc = !sortAsc; else { sortKey = k; sortAsc = true; }
    render();
  });

  const tbody = document.querySelector('#tbl tbody');
  tbody.innerHTML = rows.map(r => '<tr class="' + (r.apta ? 'apta' : '') + '">' +
    cols.map(([k, fmt]) => {
      if (k === 'ticker') return `<td class="tk"><a href="https://finance.yahoo.com/quote/${encodeURIComponent(r.ticker)}" target="_blank" rel="noopener">${r.ticker}</a></td>`;
      if (k === 'nombre') return `<td class="nm" title="${r.nombre}">${r.nombre}</td>`;
      if (k === 'apta') return r.apta
        ? `<td style="text-align:center"><span class="badge si">${t.pasa}</span></td>`
        : `<td style="text-align:center"><span class="badge no" title="${(r.razones || []).map(trRazon).join('; ')}">${t.noPasa}</span></td>`;
      return `<td>${fmt(r[k])}</td>`;
    }).join('') + '</tr>').join('');

  if (vista === 'cartera') {
    const rents = rows.map(r => r.rent).filter(v => v != null);
    const media = rents.length ? rents.reduce((a, b) => a + b, 0) / rents.length : null;
    const mtxt = media == null ? '' :
      ` · ${lang === 'es' ? 'media' : 'avg'} ${media >= 0 ? '+' : ''}${(media * 100).toFixed(1)}%`;
    document.getElementById('count').textContent = `${rows.length} ${t.valores}${mtxt}`;
  } else {
    document.getElementById('count').textContent = `${rows.length} ${t.valores}`;
  }
}

document.getElementById('langBtn').onclick = () => {
  lang = lang === 'es' ? 'en' : 'es';
  localStorage.setItem('vs_lang', lang);
  applyLang();
};
document.getElementById('tabG').onclick = () => setVista('general');
document.getElementById('tabF').onclick = () => setVista('financieras');
document.getElementById('tabL').onclick = () => setVista('corta');
document.getElementById('tabC').onclick = () => setVista('cartera');
function setVista(v) {
  vista = v;
  if (v === 'cartera') { sortKey = 'rent'; sortAsc = false; }
  else { sortKey = 'rank'; sortAsc = true; }
  document.getElementById('tabG').classList.toggle('on', v === 'general');
  document.getElementById('tabF').classList.toggle('on', v === 'financieras');
  document.getElementById('tabL').classList.toggle('on', v === 'corta');
  document.getElementById('tabC').classList.toggle('on', v === 'cartera');
  document.getElementById('cortaNota').style.display = v === 'corta' ? 'block' : 'none';
  document.getElementById('carteraNota').style.display = v === 'cartera' ? 'block' : 'none';
  render();
}
document.getElementById('q').oninput = render;
document.getElementById('soloAptas').onchange = render;
document.getElementById('uni').onchange = render;

applyLang();
</script>
</body>
</html>
