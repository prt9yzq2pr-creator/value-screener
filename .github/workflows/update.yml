name: Actualizar ranking

on:
  schedule:
    - cron: "30 6 * * 1"     # lunes 06:30 UTC
  workflow_dispatch:          # boton de ejecucion manual

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install yfinance certifi

      - name: Preparar cache (mapa de tickers versionado)
        # www.sec.gov bloquea las IPs de GitHub Actions; el mapa ticker->CIK
        # va versionado en el repo y se siembra en la cache antes del barrido
        run: |
          mkdir -p .cache
          cp edgar_company_tickers.json .cache/

      - name: Refrescar datos (EDGAR)
        run: python value_screener.py update --refresh 168 --rate 150 --csv ranking_completo.csv

      - name: Generar web
        run: python build_site.py

      - name: Publicar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add universe_metrics.json docs/data.json ranking_completo.csv
          git commit -m "Actualizacion automatica del ranking" || echo "Sin cambios"
          git push
